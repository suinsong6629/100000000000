<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가족 통합 자산 대시보드</title>
    <!-- 라이브러리 링크 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        netflix: '#E50914',
                        darkBg: '#141414',
                        cardLight: '#ffffff',
                        cardDark: '#1f2937'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .profile-card:hover .profile-img { outline: 3px solid white; transform: scale(1.05); }
        .transition-all { transition: all 0.3s ease; }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        /* 클릭 방해 요소 제거를 위한 CSS */
        #status-toast { pointer-events: none; }
        #status-toast > div { pointer-events: auto; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300">

    <!-- [알림 메시지 박스] -->
    <div id="status-toast" class="fixed top-20 right-4 z-[100] transform translate-x-full transition-transform duration-300">
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-xl rounded-lg px-6 py-3 flex items-center gap-3">
            <div id="toast-icon"></div>
            <p id="toast-message" class="text-sm font-bold"></p>
        </div>
    </div>

    <!-- [뷰 1] 프로필 선택 화면 (넷플릭스 스타일) -->
    <div id="profile-selection-view" class="fixed inset-0 bg-darkBg text-white flex flex-col items-center justify-center z-50 transition-opacity duration-500">
        <h1 class="text-3xl md:text-5xl font-bold mb-12 tracking-tight">누구의 자산을 관리할까요?</h1>
        <div id="profiles-container" class="flex flex-wrap justify-center gap-8 max-w-5xl px-6"></div>
        <div class="mt-16 flex gap-4">
            <button id="manage-profiles-btn" onclick="toggleEditMode()" class="border border-gray-600 text-gray-400 px-8 py-2 hover:text-white hover:border-white transition-all font-semibold">프로필 관리</button>
            <button id="add-profile-btn" onclick="openProfileModal()" class="hidden bg-white text-black px-8 py-2 hover:bg-gray-200 transition-all font-semibold">프로필 추가</button>
        </div>
    </div>

    <!-- [뷰 2] 대시보드 메인 -->
    <div id="dashboard-view" class="hidden min-h-screen pb-20">
        <!-- 네비게이션 바 -->
        <nav class="sticky top-0 z-30 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
            <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                <button onclick="showProfileSelection()" class="flex items-center gap-2 text-gray-500 hover:text-gray-900 dark:hover:text-white transition">
                    <i class="fa-solid fa-chevron-left"></i>
                    <span class="font-bold">프로필 변경</span>
                </button>
                <div class="flex items-center gap-4">
                    <button onclick="updateAllPrices()" id="refresh-prices-btn" class="flex items-center gap-2 px-3 py-1.5 bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-300 rounded-lg font-bold text-xs border border-green-100 dark:border-green-800 transition hover:scale-105">
                        <i class="fa-solid fa-rotate"></i> 시세 & 배당 업데이트
                    </button>
                    <button onclick="toggleCurrency()" id="currency-toggle" class="px-4 py-1.5 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-300 rounded-full font-bold text-xs border border-indigo-100 dark:border-indigo-800">KRW / USD</button>
                    <button onclick="togglePrivacy()" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition"><i id="privacy-icon" class="fa-solid fa-eye"></i></button>
                    <button onclick="toggleDarkMode()" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition"><i id="dark-mode-icon" class="fa-solid fa-moon"></i></button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pt-8">
            <!-- 개인 목표 배너 -->
            <div class="relative overflow-hidden bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 rounded-3xl p-8 text-white shadow-xl mb-10">
                <div class="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div>
                        <div class="flex items-center gap-3 mb-2">
                            <span id="profile-badge" class="px-3 py-1 bg-white/20 rounded-full text-xs font-bold backdrop-blur-sm">개인관리</span>
                            <h2 id="dashboard-title" class="text-3xl font-extrabold tracking-tight">사용자</h2>
                        </div>
                        <p id="dashboard-goal" class="text-indigo-100 text-lg opacity-90 font-medium">목표가 없습니다.</p>
                    </div>
                    <div class="flex items-center gap-6 bg-white/10 p-4 rounded-2xl backdrop-blur-md border border-white/20">
                        <div class="text-center">
                            <p class="text-xs text-indigo-200 font-bold uppercase tracking-wider mb-1">D-Day</p>
                            <p id="dashboard-dday-count" class="text-3xl font-black">D-0</p>
                        </div>
                        <button id="edit-goal-btn" onclick="openGoalModal()" class="w-10 h-10 rounded-xl bg-white/20 hover:bg-white/40 flex items-center justify-center transition"><i class="fa-solid fa-pen-to-square"></i></button>
                    </div>
                </div>
            </div>

            <!-- 요약 영역 -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-10">
                <div class="lg:col-span-4 bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col justify-between">
                    <div>
                        <h3 class="text-gray-500 dark:text-gray-400 font-bold text-sm mb-1">나의 총자산 가치</h3>
                        <div id="total-asset-value" class="text-4xl font-black tracking-tight dark:text-white transition-all">₩0</div>
                        <div id="total-asset-usd" class="text-lg text-gray-400 font-medium mt-1">$0.00</div>
                    </div>
                    <div class="mt-8 pt-6 border-t border-gray-50 dark:border-gray-700">
                        <div class="flex justify-between items-center mb-2"><span class="text-sm text-gray-500">실시간 환율</span><span class="text-sm font-bold text-indigo-600">1,350원 (고정)</span></div>
                    </div>
                </div>
                <div class="lg:col-span-4 bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-700">
                    <h3 class="font-bold mb-6 flex items-center gap-2"><i class="fa-solid fa-chart-pie text-indigo-500"></i> 자산 비중</h3>
                    <div class="h-48 relative flex justify-center items-center"><canvas id="allocationChart"></canvas></div>
                </div>
                <div class="lg:col-span-4 bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-700">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold flex items-center gap-2"><i class="fa-solid fa-coins text-yellow-500"></i> 예상 배당금</h3>
                        <div class="flex items-center gap-1 bg-gray-100 dark:bg-gray-700 p-1 rounded-lg">
                            <button onclick="changeYear(-1)" class="w-6 h-6 flex items-center justify-center hover:bg-white dark:hover:bg-gray-600 rounded shadow-sm"><i class="fa-solid fa-chevron-left text-[10px]"></i></button>
                            <span id="year-display" class="text-xs font-bold px-2">2024</span>
                            <button onclick="changeYear(1)" class="w-6 h-6 flex items-center justify-center hover:bg-white dark:hover:bg-gray-600 rounded shadow-sm"><i class="fa-solid fa-chevron-right text-[10px]"></i></button>
                        </div>
                    </div>
                    <div class="h-32"><canvas id="dividendChart"></canvas></div>
                    <div class="mt-4 text-center">
                        <p class="text-xs text-gray-500 mb-1">연간 배당금 총계</p>
                        <p id="total-dividend-value" class="text-xl font-black text-indigo-600 dark:text-indigo-400">₩0</p>
                    </div>
                </div>
            </div>

            <!-- 자산 리스트 -->
            <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                <div class="p-8 border-b border-gray-50 dark:border-gray-700">
                    <h3 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-list-ul text-blue-500"></i> 상세 자산 내역</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-gray-400 text-xs font-bold uppercase tracking-wider border-b border-gray-50 dark:border-gray-700">
                                <th class="px-8 py-4">자산명 (티커)</th><th class="px-8 py-4">분류</th><th class="px-8 py-4 text-right">수량</th><th class="px-8 py-4 text-right">현재가</th><th class="px-8 py-4 text-right">연배당금(주당)</th><th class="px-8 py-4 text-right">평가액</th><th id="th-action" class="px-8 py-4 text-center">관리</th>
                            </tr>
                        </thead>
                        <tbody id="asset-list-body" class="divide-y divide-gray-50 dark:divide-gray-700"></tbody>
                    </table>
                </div>
                <div id="add-asset-section" class="p-8 bg-gray-50/50 dark:bg-gray-900/20">
                    <form onsubmit="addAsset(event)" class="grid grid-cols-1 md:grid-cols-5 gap-4">
                        <select id="new-type" required onchange="updateTickerPlaceholder()" class="p-3 rounded-xl border border-gray-200 dark:bg-gray-800 dark:border-gray-600 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                            <option value="미국주식">미국주식 (Ticker)</option>
                            <option value="국내주식">국내주식 (종목명/코드)</option>
                            <option value="ISA">ISA (KRW)</option>
                            <option value="코인">코인 (Symbol)</option>
                            <option value="금(돈)">금(돈) (KRW)</option>
                            <option value="가용현금(원화)">가용현금(원화)</option>
                            <option value="가용현금(달러)">가용현금(달러)</option>
                            <option value="보험">보험 (KRW)</option>
                        </select>
                        <input type="text" id="new-name" placeholder="자산명" required class="p-3 rounded-xl border border-gray-200 dark:bg-gray-800 dark:border-gray-600 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        <input type="text" id="new-ticker" placeholder="티커 (예: AAPL)" class="p-3 rounded-xl border border-gray-200 dark:bg-gray-800 dark:border-gray-600 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        <input type="number" id="new-amount" step="any" placeholder="수량/금액" required class="p-3 rounded-xl border border-gray-200 dark:bg-gray-800 dark:border-gray-600 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition shadow-lg shadow-indigo-200 dark:shadow-none">추가</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- 모달: 목표/프로필 설정 -->
    <div id="goal-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 dark:text-white">프로필 및 목표 편집</h3>
            <div class="space-y-5 text-left">
                <div><label class="block text-xs font-bold text-gray-400 mb-2 uppercase">프로필 이름</label><input type="text" id="m-name" class="w-full p-3 rounded-xl border border-gray-200 dark:bg-gray-700 dark:border-gray-600"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2 uppercase">재무 목표</label><input type="text" id="m-goal" class="w-full p-3 rounded-xl border border-gray-200 dark:bg-gray-700 dark:border-gray-600"></div>
                <div><label class="block text-xs font-bold text-gray-400 mb-2 uppercase">목표 날짜</label><input type="date" id="m-dday" class="w-full p-3 rounded-xl border border-gray-200 dark:bg-gray-700 dark:border-gray-600"></div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeGoalModal()" class="px-6 py-3 rounded-xl bg-gray-100 dark:bg-gray-700 font-bold transition">취소</button>
                <button onclick="saveProfileChanges()" class="px-6 py-3 rounded-xl bg-indigo-600 text-white font-bold shadow-lg transition hover:bg-indigo-700">저장하기</button>
            </div>
        </div>
    </div>

    <!-- 모달: 수량 수정 -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-8 w-full max-w-sm shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 dark:text-white">수량 수정</h3>
            <input type="hidden" id="edit-id">
            <input type="number" id="edit-val" step="any" class="w-full p-4 rounded-xl border border-gray-200 dark:bg-gray-700 dark:border-gray-600 text-2xl font-bold mb-6">
            <div class="flex justify-end gap-3">
                <button onclick="closeEditModal()" class="px-6 py-3 rounded-xl bg-gray-100 dark:bg-gray-700 font-bold transition">취소</button>
                <button onclick="applyEdit()" class="px-6 py-3 rounded-xl bg-blue-600 text-white font-bold shadow-lg transition hover:bg-blue-700">수정 완료</button>
            </div>
        </div>
    </div>

    <script>
        // API 설정 (제공해주신 키 반영)
        const apiKey = "AIzaSyD6DEk7GyOsvZ_ii0DO6_6Wq_Djvunr8Ck"; 
        const EX_RATE = 1350;
        const COLORS = ['bg-blue-500', 'bg-red-500', 'bg-green-500', 'bg-yellow-500', 'bg-purple-500', 'bg-indigo-500'];
        
        let state = {
            profiles: [],
            currId: null,
            isDark: false,
            isPrivacy: false,
            isUSD: false,
            year: new Date().getFullYear(),
            editMode: false,
            isUpdating: false
        };

        let allocChart = null, divChart = null;

        // 1. 초기화 (안정성 극대화)
        function init() {
            try {
                const saved = localStorage.getItem('familyProfilesLocal');
                if (saved) state.profiles = JSON.parse(saved);
                if (!Array.isArray(state.profiles) || state.profiles.length === 0) {
                    state.profiles = [{ id: 'p_main', name: '나', avatar: 'bg-indigo-600', goal: '경제적 자유', dday: '2030-12-31', assets: [] }];
                    save();
                }
                if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    state.isDark = true; document.documentElement.classList.add('dark');
                }
                updateIcons(); renderProfiles();
            } catch (e) {
                state.profiles = [{ id: 'p_main', name: '나', avatar: 'bg-indigo-600', goal: '경제적 자유', dday: '2030-12-31', assets: [] }];
                save(); renderProfiles();
            }
        }

        function save() { localStorage.setItem('familyProfilesLocal', JSON.stringify(state.profiles)); }

        // 2. 실시간 시세 업데이트 (Gemini API - 실패 확률 0%에 도전하는 로직)
        async function updateAllPrices() {
            if (state.isUpdating) return;
            const p = getActive();
            if (!p || p.id === 'all') return;
            const targets = (p.assets || []).filter(a => ['미국주식', '국내주식', '코인'].includes(a.type) && a.ticker);
            
            if (targets.length === 0) { showToast("업데이트할 티커(Ticker) 자산이 없습니다.", "info"); return; }
            state.isUpdating = true; 
            showToast("실시간 정보를 조회 중입니다...", "loading");
            const btn = document.getElementById('refresh-prices-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner loading-spinner"></i> 조회 중...`;

            try {
                const tickers = targets.map(a => `${a.type}: ${a.ticker}`).join(', ');
                const userQuery = `Search real-time market price and annual dividend for: ${tickers}. US(USD), KR/Coin(KRW). Return ONLY JSON object: {"TICKER": {"price": number, "dividend": number}}. No text.`;

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userQuery }] }],
                        tools: [{ "google_search": {} }]
                    })
                });

                if (!response.ok) throw new Error("API 연동 실패");
                const result = await response.json();
                const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                
                // 마크다운 태그가 섞여 있어도 JSON만 골라내는 정교한 파싱
                const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                const dataMap = JSON.parse(jsonMatch ? jsonMatch[0] : "{}");
                
                let successCount = 0;
                targets.forEach(a => {
                    // 티커 매칭 (대소문자 무관하게 가장 유사한 키 찾기)
                    const key = Object.keys(dataMap).find(k => k.toUpperCase().includes(a.ticker.toUpperCase()) || a.ticker.toUpperCase().includes(k.toUpperCase()));
                    const info = dataMap[key];
                    if (info) { 
                        a.price = parseFloat(info.price) || a.price; 
                        a.div = parseFloat(info.dividend) || 0; 
                        successCount++;
                    }
                });

                save(); refresh(); showToast(`${successCount}건 업데이트 완료!`, "success");
            } catch (err) {
                console.error(err);
                showToast("업데이트 오류. 티커를 확인해 주세요.", "error");
            } finally {
                state.isUpdating = false; btn.innerHTML = originalHtml;
            }
        }

        // 3. UI 로직
        function getActive() {
            if(state.currId === 'all') {
                let allAssets = []; state.profiles.forEach(p => allAssets = allAssets.concat(p.assets || []));
                return { id: 'all', name: '가족 통합', assets: allAssets };
            }
            return state.profiles.find(p => p.id === state.currId);
        }

        function val(a) {
            const isUSD = a.type === '미국주식' || a.type === '가용현금(달러)';
            let raw = 0; const amount = parseFloat(a.amount) || 0;
            if (['미국주식', '국내주식', '코인'].includes(a.type)) raw = a.price ? (amount * a.price) : 0;
            else raw = amount;
            return isUSD ? raw * EX_RATE : raw;
        }

        function fmt(n) {
            if(state.isPrivacy) return '••••••';
            if(state.isUSD) return '$' + (n / EX_RATE).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
            return '₩' + n.toLocaleString();
        }

        function renderProfiles() {
            const container = document.getElementById('profiles-container');
            if (!container) return; container.innerHTML = '';
            
            state.profiles.forEach(p => {
                const card = document.createElement('div');
                card.className = 'profile-card cursor-pointer group flex flex-col items-center w-32 md:w-40 transition-all';
                card.onclick = () => handleProfileClick(p.id);
                const editUI = state.editMode ? `<div class="absolute inset-0 bg-black/60 rounded-3xl flex items-center justify-center"><i class="fa-solid fa-pen text-white text-3xl"></i>${state.profiles.length > 1 ? `<div onclick="event.stopPropagation(); deleteProfile('${p.id}')" class="absolute -top-3 -right-3 w-8 h-8 bg-red-600 rounded-full flex items-center justify-center border-4 border-darkBg hover:scale-110"><i class="fa-solid fa-times text-xs text-white"></i></div>` : ''}</div>` : '';
                card.innerHTML = `<div class="relative w-28 h-28 md:w-36 md:h-36 rounded-3xl ${p.avatar} flex items-center justify-center text-white text-5xl shadow-xl profile-img mb-5 transition-all"><i class="fa-solid fa-user"></i>${editUI}</div><span class="text-gray-400 group-hover:text-white transition-colors text-lg font-bold text-center">${p.name}</span>`;
                container.appendChild(card);
            });

            if (!state.editMode) {
                const totalCard = document.createElement('div');
                totalCard.className = 'profile-card cursor-pointer group flex flex-col items-center w-32 md:w-40 transition-all';
                totalCard.onclick = () => selectProfile('all');
                totalCard.innerHTML = `<div class="relative w-28 h-28 md:w-36 md:h-36 rounded-3xl bg-gradient-to-br from-indigo-600 to-pink-600 flex items-center justify-center text-white text-5xl shadow-xl profile-img mb-5 transition-all"><i class="fa-solid fa-users"></i></div><span class="text-gray-400 group-hover:text-white transition-colors text-lg font-bold">가족 통합</span>`;
                container.appendChild(totalCard);
            }
        }

        function refresh() { renderList(); updateCharts(); }

        function renderList() {
            const p = getActive(); if (!p) return;
            const body = document.getElementById('asset-list-body'); body.innerHTML = '';
            (p.assets || []).forEach(a => {
                const tr = document.createElement('tr'); tr.className = "group hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors";
                const needsPrice = ['미국주식', '국내주식', '코인'].includes(a.type) && !a.price;
                const priceText = needsPrice ? `<span class="text-[10px] text-red-500 font-bold animate-pulse">업데이트 필요</span>` : (a.price ? (a.type === '미국주식' ? '$'+a.price.toLocaleString() : '₩'+a.price.toLocaleString()) : '-');
                tr.innerHTML = `<td class="px-8 py-5"><span class="font-bold dark:text-gray-200">${state.isPrivacy ? '****' : a.name}${a.ticker ? ` (${a.ticker})` : ''}</span></td><td class="px-8 py-5"><span class="px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-[10px] font-bold text-gray-500 dark:text-gray-400">${a.type}</span></td><td class="px-8 py-5 text-right font-medium">${state.isPrivacy ? '****' : (parseFloat(a.amount)||0).toLocaleString()}</td><td class="px-8 py-5 text-right font-bold">${state.isPrivacy ? '****' : priceText}</td><td class="px-8 py-5 text-right text-xs text-green-600 font-bold">${state.isPrivacy ? '****' : (parseFloat(a.div)||0).toLocaleString()}</td><td class="px-8 py-5 text-right font-black text-indigo-600">${fmt(val(a))}</td>${p.id==='all'?'':`<td class="px-8 py-5"><div class="flex justify-center gap-3"><button onclick="openEditModal('${a.id}', ${a.amount})" class="text-gray-400 hover:text-blue-500 transition"><i class="fa-solid fa-pen"></i></button><button onclick="deleteAsset('${a.id}')" class="text-gray-400 hover:text-red-500 transition"><i class="fa-solid fa-trash"></i></button></div></td>`} `;
                body.appendChild(tr);
            });
        }

        function updateCharts() {
            const p = getActive(); if (!p) return;
            const sums = {}; let totalVal = 0, totalDiv = 0;
            (p.assets || []).forEach(a => {
                const v = val(a); totalVal += v; sums[a.type] = (sums[a.type] || 0) + v;
                totalDiv += ((parseFloat(a.amount)||0) * (parseFloat(a.div)||0)) * (a.type === '미국주식' || a.type === '가용현금(달러)' ? EX_RATE : 1);
            });
            document.getElementById('total-asset-value').textContent = fmt(totalVal);
            document.getElementById('total-asset-usd').textContent = '$' + (totalVal / EX_RATE).toLocaleString(undefined, {maximumFractionDigits:2});
            document.getElementById('total-dividend-value').textContent = fmt(totalDiv);
            if(allocChart) allocChart.destroy();
            allocChart = new Chart(document.getElementById('allocationChart'), {
                type: 'doughnut', data: { labels: Object.keys(sums), datasets: [{ data: Object.values(sums), backgroundColor: ['#6366f1', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#64748b'], borderWidth: 0 }] },
                options: { cutout: '75%', plugins: { legend: { display: false } } }
            });
            if(divChart) divChart.destroy();
            divChart = new Chart(document.getElementById('dividendChart'), {
                type: 'bar', data: { labels: Array.from({length:12}, (_, i) => `${i+1}월`), datasets: [{ data: Array(12).fill(totalDiv / 12), backgroundColor: '#6366f1', borderRadius: 5 }] },
                options: { maintainAspectRatio: false, scales: { y: { display: false } }, plugins: { legend: { display: false } } }
            });
        }

        // 4. 기능 제어
        function handleProfileClick(id) { if(state.editMode) { state.currId = id; openGoalModal(true); } else selectProfile(id); }

        function selectProfile(id) {
            state.currId = id; const view = document.getElementById('profile-selection-view');
            view.classList.add('opacity-0');
            setTimeout(() => {
                view.classList.add('hidden'); document.getElementById('dashboard-view').classList.remove('hidden');
                const p = getActive();
                if (p) {
                    document.getElementById('dashboard-title').textContent = p.name;
                    document.getElementById('dashboard-goal').textContent = p.goal || '목표가 없습니다.';
                    document.getElementById('profile-badge').textContent = p.id === 'all' ? '가족통합' : '개인관리';
                    const isAll = p.id === 'all';
                    document.getElementById('edit-goal-btn').style.display = isAll ? 'none' : 'flex';
                    document.getElementById('add-asset-section').style.display = isAll ? 'none' : 'block';
                    document.getElementById('th-action').style.display = isAll ? 'none' : 'table-cell';
                    if(p.dday) {
                        const diff = Math.ceil((new Date(p.dday) - new Date()) / (1000*60*60*24));
                        document.getElementById('dashboard-dday-count').textContent = diff >= 0 ? `D-${diff}` : `D+${Math.abs(diff)}`;
                    } else { document.getElementById('dashboard-dday-count').textContent = 'D-?'; }
                    refresh();
                }
            }, 300);
        }

        function showProfileSelection() {
            document.getElementById('dashboard-view').classList.add('hidden');
            const view = document.getElementById('profile-selection-view');
            view.classList.remove('hidden'); setTimeout(() => view.classList.remove('opacity-0'), 10);
            state.editMode = false; renderProfiles();
        }

        function toggleEditMode() {
            state.editMode = !state.editMode;
            const btn = document.getElementById('manage-profiles-btn');
            const add = document.getElementById('add-profile-btn');
            if(state.editMode) {
                btn.textContent = '완료'; btn.className = "bg-white text-black px-8 py-2 font-semibold transition-all"; add.classList.remove('hidden');
            } else {
                btn.textContent = '프로필 관리'; btn.className = "border border-gray-600 text-gray-400 px-8 py-2 hover:text-white hover:border-white font-semibold transition-all"; add.classList.add('hidden');
            }
            renderProfiles();
        }

        function addAsset(e) {
            e.preventDefault(); const p = state.profiles.find(x => x.id === state.currId); if (!p) return;
            const asset = { id: Date.now().toString(), type: document.getElementById('new-type').value, name: document.getElementById('new-name').value, ticker: document.getElementById('new-ticker').value.trim().toUpperCase(), amount: parseFloat(document.getElementById('new-amount').value)||0, div: 0, price: null };
            if (!p.assets) p.assets = []; p.assets.push(asset);
            save(); refresh(); e.target.reset(); showToast("자산 추가 완료! 시세를 업데이트하세요.", "success");
        }

        function deleteAsset(id) { if(!confirm('삭제하시겠습니까?')) return; const p = getActive(); p.assets = p.assets.filter(a => a.id !== id); save(); refresh(); }

        function saveProfileChanges() {
            const name = document.getElementById('m-name').value; if(!name) return;
            if(state.currId && state.editMode) {
                const p = state.profiles.find(x => x.id === state.currId);
                if(p) { p.name = name; p.goal = document.getElementById('m-goal').value; p.dday = document.getElementById('m-dday').value; }
            } else {
                const newId = 'p_' + Date.now();
                state.profiles.push({ id: newId, name, assets: [], avatar: COLORS[state.profiles.length % COLORS.length], goal: document.getElementById('m-goal').value, dday: document.getElementById('m-dday').value });
            }
            save(); closeGoalModal(); state.editMode ? renderProfiles() : selectProfile(state.currId);
        }

        function deleteProfile(id) { if(!confirm('프로필과 데이터가 삭제됩니다.')) return; state.profiles = state.profiles.filter(x => x.id !== id); save(); renderProfiles(); }

        // 유틸리티
        function showToast(msg, type) {
            const t = document.getElementById('status-toast'), m = document.getElementById('toast-message'), i = document.getElementById('toast-icon');
            if (!t || !m || !i) return; m.textContent = msg;
            i.innerHTML = type === 'loading' ? '<i class="fa-solid fa-spinner loading-spinner text-blue-500"></i>' : (type === 'success' ? '<i class="fa-solid fa-check-circle text-green-500"></i>' : '<i class="fa-solid fa-exclamation-circle text-red-500"></i>');
            t.classList.remove('translate-x-full'); if (type !== 'loading') setTimeout(() => t.classList.add('translate-x-full'), 3000);
        }

        function toggleDarkMode() { state.isDark = !state.isDark; document.documentElement.classList.toggle('dark'); localStorage.theme = state.isDark ? 'dark' : 'light'; updateIcons(); updateCharts(); }
        function togglePrivacy() { state.isPrivacy = !state.isPrivacy; updateIcons(); refresh(); }
        function toggleCurrency() { state.isUSD = !state.isUSD; refresh(); }
        function updateIcons() { 
            const d = document.getElementById('dark-mode-icon'), p = document.getElementById('privacy-icon');
            if(d) d.className = state.isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            if(p) p.className = state.isPrivacy ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
        }
        function openGoalModal(isEdit) {
            const p = isEdit ? state.profiles.find(x => x.id === state.currId) : getActive();
            document.getElementById('m-name').value = p ? p.name : ''; document.getElementById('m-goal').value = p ? p.goal : ''; document.getElementById('m-dday').value = p ? p.dday : '';
            document.getElementById('goal-modal').classList.remove('hidden');
        }
        function closeGoalModal() { document.getElementById('goal-modal').classList.add('hidden'); }
        function openEditModal(id, v) { document.getElementById('edit-id').value = id; document.getElementById('edit-val').value = v; document.getElementById('edit-modal').classList.remove('hidden'); }
        function closeEditModal() { document.getElementById('edit-modal').classList.add('hidden'); }
        function applyEdit() {
            const p = getActive(); const a = p.assets.find(x => x.id === document.getElementById('edit-id').value);
            if(a) a.amount = parseFloat(document.getElementById('edit-val').value)||0;
            save(); refresh(); closeEditModal();
        }
        function openProfileModal() { state.currId = null; openGoalModal(false); }
        function changeYear(d) { state.year += d; document.getElementById('year-display').textContent = state.year; updateCharts(); }
        function updateTickerPlaceholder() { const type = document.getElementById('new-type').value, t = document.getElementById('new-ticker'); if (type === '미국주식') t.placeholder = "티커 (AAPL)"; else if (type === '국내주식') t.placeholder = "종목코드 (005930)"; else if (type === '코인') t.placeholder = "심볼 (BTC)"; else t.placeholder = "해당 없음"; }

        window.onload = init;
    </script>
</body>
</html>
